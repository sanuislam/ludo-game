services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ludo
      POSTGRES_PASSWORD: ludo
      POSTGRES_DB: ludo
    ports:
      - "5432:5432"
    volumes:
      - ludo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ludo -d ludo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ludo_pgdata:
